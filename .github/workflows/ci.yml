name: CI

env:
  HUSKY: 0
  APP_URL: https://nyumatflix.com
  AUTH_URL: https://nyumatflix.com
  NEXTAUTH_URL: https://nyumatflix.com
  FLARESOLVERR_URL: http://flaresolverr:8191/v1
  SCRAPE_PROXY_URL: http://gluetun:8888
  SCRAPE_VPN_CONTROL_URL: http://gluetun:8000
  SCRAPE_VPN_ROTATE_COUNTRIES: Germany,Netherlands,France,United States
  FLIPT_URL: http://flipt:8080
  FLIPT_ENVIRONMENT: default
  FLIPT_NAMESPACE: default
  FLIPT_FLAG_CACHE_TTL_MS: "30000"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_RESEND_KEY: ${{ secrets.AUTH_RESEND_KEY }}
      ID_MOE_API_KEY: ${{ secrets.ID_MOE_API_KEY }}
      FLIPT_API_TOKEN: ${{ secrets.FLIPT_API_TOKEN }}
      SCRAPE_VPN_CONTROL_API_KEY: ${{ secrets.SCRAPE_VPN_CONTROL_API_KEY }}
      SCRAPE_VPN_ROTATE_SECRET: ${{ secrets.SCRAPE_VPN_ROTATE_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create .env.local for CI
        run: |
          cat > .env.local <<EOF
          TMDB_API_KEY=${TMDB_API_KEY}
          NEXT_PUBLIC_TMDB_API_KEY=${NEXT_PUBLIC_TMDB_API_KEY}
          DATABASE_URL=${DATABASE_URL}
          PROD_DATABASE_URL=${PROD_DATABASE_URL}
          AUTH_SECRET=${AUTH_SECRET}
          AUTH_RESEND_KEY=${AUTH_RESEND_KEY}
          ID_MOE_API_KEY=${ID_MOE_API_KEY}
          APP_URL=${APP_URL}
          AUTH_URL=${AUTH_URL}
          NEXTAUTH_URL=${NEXTAUTH_URL}
          FLARESOLVERR_URL=${FLARESOLVERR_URL}
          SCRAPE_PROXY_URL=${SCRAPE_PROXY_URL}
          SCRAPE_VPN_CONTROL_URL=${SCRAPE_VPN_CONTROL_URL}
          SCRAPE_VPN_CONTROL_API_KEY=${SCRAPE_VPN_CONTROL_API_KEY}
          SCRAPE_VPN_ROTATE_SECRET=${SCRAPE_VPN_ROTATE_SECRET}
          SCRAPE_VPN_ROTATE_COUNTRIES=${SCRAPE_VPN_ROTATE_COUNTRIES}
          FLIPT_URL=${FLIPT_URL}
          FLIPT_ENVIRONMENT=${FLIPT_ENVIRONMENT}
          FLIPT_NAMESPACE=${FLIPT_NAMESPACE}
          FLIPT_API_TOKEN=${FLIPT_API_TOKEN}
          FLIPT_FLAG_CACHE_TTL_MS=${FLIPT_FLAG_CACHE_TTL_MS}
          EOF

      - name: Build the app
        if: github.event_name == 'push'
        env:
          NODE_ENV: production
        run: bun run build

      - name: Check formatting
        run: bun run check-format

      - name: Run lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Run tests
        env:
          NODE_ENV: test
        run: bun run test-ci

  build-push:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      DOCKER_REPOSITORY: whotypes/nyumatflix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
            ${{ env.DOCKER_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [ci, build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: nyumatflix-production
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/whotypes/apps/nyumatflix' }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DOCKER_IMAGE: whotypes/nyumatflix:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync deploy files
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/scripts'"
          rsync -avz -e "ssh -p $DEPLOY_PORT" \
            scripts/deploy.sh docker-compose.scrape.yml docker-compose.ffs.yml \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          rsync -avz -e "ssh -p $DEPLOY_PORT" \
            scripts/reconcile-prod-infra.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/reconcile-prod-infra.sh"
          if [[ -d flipt ]]; then
            rsync -avz -e "ssh -p $DEPLOY_PORT" \
              flipt/ \
              "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/flipt/"
          fi

      - name: Deploy latest image
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          set -euo pipefail
          NYUMATFLIX_ROOT="$DEPLOY_PATH" DOCKER_IMAGE="$DOCKER_IMAGE" "$DEPLOY_PATH/deploy.sh" serve
          EOF
