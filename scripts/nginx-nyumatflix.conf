# ── nyumatflix.com HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name nyumatflix.com www.nyumatflix.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── nyumatflix.com HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nyumatflix.com www.nyumatflix.com;

    ssl_certificate /etc/letsencrypt/live/nyumatflix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nyumatflix.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_header_timeout 15s;
    client_body_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 60s;
    limit_req_status 429;
    limit_conn_status 429;
    limit_conn nyumatflix_per_ip 50;
    limit_conn nyumatflix_server 1200;

    location ^~ /_next/static/ {
        proxy_pass http://nyumatflix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_cache nyumatflix_static;
        proxy_cache_lock on;
        proxy_cache_valid 200 7d;
        add_header X-NyumatFlix-Cache $upstream_cache_status always;
    }

    location = /api/servers/health {
        limit_req zone=nyumatflix_health burst=10 nodelay;
        proxy_pass http://nyumatflix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering on;
    }

    location ^~ /api/scrape/play/ {
        limit_req zone=nyumatflix_stream burst=40 nodelay;
        limit_conn nyumatflix_per_ip 20;
        limit_conn nyumatflix_server 1200;
        proxy_pass http://nyumatflix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_buffering off;
    }

    location ^~ /api/live/play/ {
        limit_req zone=nyumatflix_stream burst=40 nodelay;
        limit_conn nyumatflix_per_ip 20;
        limit_conn nyumatflix_server 1200;
        proxy_pass http://nyumatflix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_buffering off;
    }

    location / {
        limit_req zone=nyumatflix_general burst=60 nodelay;
        proxy_pass http://nyumatflix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $nyumatflix_connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering on;
    }
}
