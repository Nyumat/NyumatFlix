# ── nyumatflix.com HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name nyumatflix.com www.nyumatflix.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── nyumatflix.com HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nyumatflix.com www.nyumatflix.com;

    ssl_certificate /etc/letsencrypt/live/nyumatflix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nyumatflix.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
