server {
    listen 80;
    listen [::]:80;
    server_name ffs.nyumatflix.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ffs.nyumatflix.com;

    ssl_certificate /etc/letsencrypt/live/ffs.nyumatflix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ffs.nyumatflix.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic "NyumatFlix FFS Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-ffs;

    location / {
        proxy_pass http://nyumatflix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
